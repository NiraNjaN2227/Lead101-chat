<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function(){try{var k='con-ai-theme',v=localStorage.getItem(k),d=window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.documentElement.setAttribute('data-theme',v==='light'||v==='dark'?v:(d?'dark':'light'));}catch(e){}})();
    </script>
    <title>CON AI – Student Admission Assistant</title>
    <meta name="description" content="CON AI – Your personalised student admission assistant powered by AI.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="chat-container">

    <header class="chat-header">
        <div class="header-left">
            <div class="header-icon" aria-hidden="true">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <div class="header-title-block">
                <h1>CON AI <span class="header-badge">Admissions</span></h1>
                <p class="header-subtitle">
                    <span class="status-dot" title="Online" aria-hidden="true"></span>
                    Ready to help with your application
                </p>
            </div>
        </div>
        <div class="header-actions">
            <div class="theme-toggle" role="radiogroup" aria-label="Color theme">
                <button type="button" class="theme-toggle-option" data-theme="light" role="radio" aria-checked="false" title="Light mode">
                    <i class="fa-solid fa-sun" aria-hidden="true"></i><span class="sr-only">Light</span>
                </button>
                <button type="button" class="theme-toggle-option" data-theme="dark" role="radio" aria-checked="false" title="Dark mode">
                    <i class="fa-solid fa-moon" aria-hidden="true"></i><span class="sr-only">Dark</span>
                </button>
                <button type="button" class="theme-toggle-option" data-theme="system" role="radio" aria-checked="true" title="Use device theme">
                    <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i><span class="sr-only">Match system</span>
                </button>
            </div>
            <button type="button" id="reset-btn" class="btn-icon-text" title="Start fresh chat">
                <i class="fa-regular fa-arrow-rotate-right" aria-hidden="true"></i>
                <span>New chat</span>
            </button>
        </div>
    </header>

    <!-- ── Chat Window ─────────────────────────── -->
    <div id="chat-window" role="log" aria-live="polite" aria-label="Chat messages">

        <!-- Welcome message -->
        <div class="message assistant">
            <div class="message-content">
                <div class="avatar" aria-hidden="true">AI</div>
                <div class="bubble-group">
                    <div class="message-bubble">
                        Hello! I'm your CON AI Admission Assistant. Please share your <strong>Student ID</strong> (e.g. STU2026XXXX) to get started, or choose one of the common questions below.
                    </div>
                    <div class="message-meta">
                        <span class="message-time">Just now</span>
                    </div>
                    <div class="quick-prompts">
                        <button type="button" class="quick-prompt" data-prompt="What documents do I need for admission?">Documents required</button>
                        <button type="button" class="quick-prompt" data-prompt="When is the application deadline?">Application deadline</button>
                        <button type="button" class="quick-prompt" data-prompt="How do I check my application status?">Check application status</button>
                        <button type="button" class="quick-prompt" data-prompt="What are the fee structure and payment options?">Fees &amp; payment</button>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /#chat-window -->

    <!-- ── Input Area ──────────────────────────── -->
    <div class="input-area">
        <div class="suggested-chips" aria-label="Suggested topics">
            <button type="button" class="chip" data-prompt="Tell me about course requirements">Course requirements</button>
            <button type="button" class="chip" data-prompt="How do I contact the admissions office?">Contact admissions</button>
            <button type="button" class="chip" data-prompt="What scholarships are available?">Scholarships</button>
        </div>
        <div class="input-wrapper">
            <input
                type="text"
                id="user-input"
                placeholder="Type your message…"
                autocomplete="off"
                aria-label="Your message"
            >
            <button id="send-btn" type="button" title="Send message" aria-label="Send">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <footer class="chat-footer">
        <span>CON AI</span><span class="footer-sep" aria-hidden="true">·</span><span>Secure</span><span class="footer-sep" aria-hidden="true">·</span><span>Not stored permanently</span>
    </footer>

</div>

<script>
    (function themeInit() {
        const STORAGE_KEY = 'con-ai-theme';
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        function getMode() {
            const v = localStorage.getItem(STORAGE_KEY);
            return v === 'light' || v === 'dark' ? v : 'system';
        }
        function resolvedTheme(mode) {
            if (mode === 'light' || mode === 'dark') return mode;
            return mq.matches ? 'dark' : 'light';
        }
        function applyTheme() {
            const mode = getMode();
            const applied = resolvedTheme(mode);
            document.documentElement.setAttribute('data-theme', applied);
            document.querySelectorAll('.theme-toggle-option').forEach((btn) => {
                const t = btn.dataset.theme;
                // Bug 1 fix: reflect the *applied* theme on initial load/system mode.
                // If mode is 'system', we highlight the resolved theme (light/dark), not the system button.
                const active = t === applied;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-checked', active ? 'true' : 'false');
            });
        }
        applyTheme();
        mq.addEventListener('change', () => { if (getMode() === 'system') applyTheme(); });
        document.querySelector('.theme-toggle')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.theme-toggle-option');
            if (!btn) return;
            const t = btn.dataset.theme;
            if (t === 'system') localStorage.removeItem(STORAGE_KEY);
            else localStorage.setItem(STORAGE_KEY, t);
            applyTheme();
        });
    })();

    // ── Config ─────────────────────────────────────────────
    const chatWindow = document.getElementById('chat-window');
    const userInput  = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const resetBtn   = document.getElementById('reset-btn');

    const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 9);
    let   STUDENT_ID = '';

    marked.setOptions({ breaks: true, gfm: true });

    // ── Utilities ────────────────────────────────────────
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    // ── Append Message ───────────────────────────────────
    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        // Avatar: text initials only for professionalism
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.setAttribute('aria-hidden', 'true');
        avatar.textContent = role === 'user' ? 'You' : 'AI';

        // Bubble group wrapper
        const bubbleGroup = document.createElement('div');
        bubbleGroup.className = 'bubble-group';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        if (role === 'assistant') {
            bubble.innerHTML = marked.parse(text);
        } else {
            bubble.textContent = text;
        }

        // Meta row
        const meta = document.createElement('div');
        meta.className = 'message-meta';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'message-time';
        timeSpan.textContent = formatTime();
        meta.appendChild(timeSpan);

        if (role === 'assistant') {
            const copyBtn = document.createElement('button');
            copyBtn.type = 'button';
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
            copyBtn.title = 'Copy response';
            // Bug 2 fix: prevent rapid clicks from queueing timeouts/clipboard writes.
            let resetTimer = null;
            copyBtn.addEventListener('click', async () => {
                if (copyBtn.disabled) return;
                copyBtn.disabled = true;
                if (resetTimer) clearTimeout(resetTimer);
                try {
                    await navigator.clipboard.writeText(text);
                    copyBtn.innerHTML = '<i class="fa-regular fa-circle-check"></i> Copied';
                } catch (_) {
                    copyBtn.innerHTML = '<i class="fa-regular fa-triangle-exclamation"></i> Failed';
                }
                resetTimer = setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                    copyBtn.disabled = false;
                    resetTimer = null;
                }, 2000);
            });
            meta.appendChild(copyBtn);
        }

        bubbleGroup.appendChild(bubble);
        bubbleGroup.appendChild(meta);
        contentDiv.appendChild(avatar);
        contentDiv.appendChild(bubbleGroup);
        msgDiv.appendChild(contentDiv);
        chatWindow.appendChild(msgDiv);
        scrollToBottom();
    }

    // ── Typing Indicator ─────────────────────────────────
    function showTyping(id) {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = id;
        div.innerHTML = `
            <div class="message-content">
                <div class="avatar" aria-hidden="true">AI</div>
                <div class="bubble-group">
                    <div class="message-bubble">
                        <div class="typing-indicator" aria-label="Assistant is typing">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>`;
        chatWindow.appendChild(div);
        scrollToBottom();
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // ── Send Message ─────────────────────────────────────
    async function sendMessage(textToSend) {
        const text = (typeof textToSend === 'string' ? textToSend : userInput.value).trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;

        const typingId = 'typing-' + Date.now();
        setTimeout(() => showTyping(typingId), 250);

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_message: text, student_id: STUDENT_ID, session_id: SESSION_ID })
            });

            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            const data = await res.json();

            removeTyping(typingId);
            appendMessage('assistant', data.reply || 'I did not receive a valid response. Please try again.');
        } catch (err) {
            console.error(err);
            removeTyping(typingId);
            appendMessage('assistant', 'Sorry, something went wrong connecting to the server. Please try again.');
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // ── Event Listeners ──────────────────────────────────
    sendBtn.addEventListener('click', () => sendMessage());

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Delegated handler for quick-prompts and chips (works after DOM reset too)
    document.body.addEventListener('click', (e) => {
        const el = e.target.closest('.quick-prompt, .chip');
        if (el) {
            const prompt = el.dataset.prompt;
            if (prompt) sendMessage(prompt);
        }
    });

    resetBtn.addEventListener('click', async () => {
        if (!confirm('Reset the conversation?')) return;
        try { await fetch('/session/' + SESSION_ID, { method: 'DELETE' }); } catch {}
        chatWindow.innerHTML = `
            <div class="message assistant">
                <div class="message-content">
                    <div class="avatar" aria-hidden="true">AI</div>
                    <div class="bubble-group">
                        <div class="message-bubble">Conversation reset. How can I assist you?</div>
                        <div class="message-meta"><span class="message-time">${formatTime()}</span></div>
                        <div class="quick-prompts">
                            <button type="button" class="quick-prompt" data-prompt="What documents do I need for admission?">Documents required</button>
                            <button type="button" class="quick-prompt" data-prompt="When is the application deadline?">Application deadline</button>
                            <button type="button" class="quick-prompt" data-prompt="How do I check my application status?">Check application status</button>
                            <button type="button" class="quick-prompt" data-prompt="What are the fee structure and payment options?">Fees &amp; payment</button>
                        </div>
                    </div>
                </div>
            </div>`;
        STUDENT_ID = '';
    });

    // Auto-focus
    userInput.focus();
</script>

</body>
</html>
